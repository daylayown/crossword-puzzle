name: Generate Daily Puzzle

on:
  schedule:
    - cron: '0 9 * * *'  # 2am MST / 4am EST daily
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate puzzle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 tools/generate_puzzle.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          git add puzzles/
          git diff --cached --quiet && echo "No new puzzle to commit" && exit 0
          git commit -m "Add daily puzzle for ${DATE}"
          git push
